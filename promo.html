<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promoção — EXPLORE BUS</title>

  <!-- Importa a fonte Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS desta página -->
  <link rel="stylesheet" href="promo.css">
</head>
<body>

  <!--
    =====================================================
    PÁGINA PROMO — PÁGINA "OCULTA"

    Esta página NÃO tem link em nenhuma outra página.
    Para acessar, o usuário digita o endereço direto:

      seusite.com/promo.html
      ou
      seuusuario.github.io/explore-bus/promo.html

    Objetivo: capturar dados de clientes interessados
    em promoções exclusivas.
    =====================================================
  -->

      <!-- ===== LADO DIREITO: FORMULÁRIO ===== -->
      <div class="formulario-bloco">
        <h3 class="form-titulo">Garante sua vaga</h3>

        <!--
          Formulário simples de captação
          Só pede nome e cidade, conforme pedido no briefing
        -->
        <form action="#" method="post" class="form-promo">

          <!-- ===== CAMPO: NOME ===== -->
          <div class="campo-grupo">
            <label for="nome">Seu nome</label>
            <input type="text" id="nome" name="nome" placeholder="Nome completo" required>
          </div>

          <!-- ===== CAMPO: CIDADE ===== -->
          <div class="campo-grupo">
            <label for="cidade">Sua cidade</label>
            <input type="text" id="cidade" name="cidade" placeholder="Ex: Belo Horizonte - MG" required>
          </div>

          <!-- ===== BOTÃO ENVIAR ===== -->
          <button type="submit" class="btn-enviar">Quero essa promoção!</button>

        </form>
      </div>

    </section>

  </main>

  <!-- ===== RODAPÉ ===== -->
  <footer>
    <div class="footer-content">
      <span class="footer-text">📞 +55 31 0000-0000 (Leonardo)</span>
      <span class="footer-text">✉️ explore.bus@gmail.com</span>
      <span class="footer-text">📍 Belo Horizonte - MG</span>
    </div>
  </footer>

</body>
</html>
